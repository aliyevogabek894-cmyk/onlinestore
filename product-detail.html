<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahsulot Ma'lumoti - Premium Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body x-data="{ mobileMenu: false, product: null, quantity: 1 }" x-init="
    const urlParams = new URLSearchParams(window.location.search);
    const id = parseInt(urlParams.get('id')) || 1;
    product = products.find(p => p.id === id);
">
    <!-- Navbar -->
    <nav class="glass fixed w-full z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <a href="index.html" class="text-3xl font-extrabold tracking-tighter text-dark bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600">
                    PREMIUM<span class="text-dark font-light ml-1">STORE</span>
                </a>
                <div class="flex items-center space-x-5">
                    <a href="cart.html" class="text-dark hover:text-blue-600 transition relative">
                        <i class="fas fa-shopping-cart text-xl"></i>
                        <span class="cart-badge absolute -top-2 -right-2 bg-blue-600 text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full">0</span>
                    </a>
                    <button @click="mobileMenu = !mobileMenu" class="md:hidden text-dark text-2xl"><i class="fas fa-bars"></i></button>
                </div>
            </div>
        </div>
    </nav>

    <main class="pt-32 pb-24 bg-white min-h-screen">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <template x-if="product">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-16">
                    <!-- Product Image -->
                    <div class="relative group rounded-[3rem] overflow-hidden bg-gray-100 aspect-square shadow-2xl">
                        <img :src="product.image" class="w-full h-full object-cover group-hover:scale-105 transition duration-1000">
                    </div>

                    <!-- Product Details -->
                    <div class="flex flex-col justify-center">
                        <nav class="flex mb-6 text-sm font-medium text-gray-400">
                            <a href="index.html" class="hover:text-blue-600">Bosh sahifa</a>
                            <span class="mx-2">/</span>
                            <a href="shop.html" class="hover:text-blue-600">Mahsulotlar</a>
                            <span class="mx-2">/</span>
                            <span x-text="product.category" class="text-dark"></span>
                        </nav>

                        <h1 x-text="product.name" class="text-5xl font-black text-dark mb-6"></h1>
                        
                        <div class="flex items-center mb-8">
                            <div class="flex text-yellow-400 mr-4">
                                <i class="fas fa-star"></i>
                                <i class="fas fa-star"></i>
                                <i class="fas fa-star"></i>
                                <i class="fas fa-star"></i>
                                <i class="fas fa-star-half-alt"></i>
                            </div>
                            <span class="text-gray-400">(45 sharhlar)</span>
                        </div>

                        <p x-text="product.description" class="text-xl text-gray-500 mb-10 leading-relaxed"></p>

                        <div class="text-4xl font-black text-dark mb-10" x-text="formatPrice(product.price)"></div>

                        <div class="flex flex-col sm:flex-row gap-6">
                            <div class="flex items-center bg-gray-100 rounded-2xl p-2 h-16 w-full sm:w-40 justify-between">
                                <button @click="if(quantity > 1) quantity--" class="w-12 h-12 rounded-xl text-dark hover:bg-white hover:shadow-sm transition font-bold text-xl">-</button>
                                <span class="font-bold text-xl" x-text="quantity"></span>
                                <button @click="quantity++" class="w-12 h-12 rounded-xl text-dark hover:bg-white hover:shadow-sm transition font-bold text-xl">+</button>
                            </div>
                            <button @click="addToCart(product.id); for(let i=1; i<quantity; i++) addToCart(product.id)" class="flex-1 bg-blue-600 text-white h-16 rounded-2xl font-bold text-lg hover:bg-dark transition shadow-xl shadow-blue-600/20 flex items-center justify-center space-x-3">
                                <i class="fas fa-shopping-cart"></i>
                                <span>Savatga qo'shish</span>
                            </button>
                        </div>

                        <div class="grid grid-cols-2 gap-6 mt-12 border-t pt-12">
                            <div class="flex items-center space-x-4">
                                <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center">
                                    <i class="fas fa-truck"></i>
                                </div>
                                <div>
                                    <h4 class="font-bold text-dark">Bepul yetkazish</h4>
                                    <p class="text-sm text-gray-400">100k+ dan oshiq buyurtmaga</p>
                                </div>
                            </div>
                            <div class="flex items-center space-x-4">
                                <div class="w-12 h-12 bg-green-50 text-green-600 rounded-full flex items-center justify-center">
                                    <i class="fas fa-shield-alt"></i>
                                </div>
                                <div>
                                    <h4 class="font-bold text-dark">Sifat kafolati</h4>
                                    <p class="text-sm text-gray-400">1 yillik rasmiy kafolat</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <script src="assets/js/main.js"></script>
</body>
</html>

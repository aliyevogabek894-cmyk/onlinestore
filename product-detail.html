<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahsulot Ma'lumoti - Premium Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="assets/js/db.js"></script>
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body x-data="{ mobileMenu: false, product: null, quantity: 1 }" x-init="
    const urlParams = new URLSearchParams(window.location.search);
    const id = parseInt(urlParams.get('id')) || 1;
    const allProducts = db.getProducts();
    product = allProducts.find(p => p.id === id);
">
    <!-- Navbar -->
    <nav class="glass fixed w-full z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <a href="index.html" class="text-3xl font-extrabold tracking-tighter text-dark bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-blue-600">
                    PREMIUM<span class="text-dark font-light ml-1">STORE</span>
                </a>
                <div class="flex items-center space-x-5" x-data="{ isDark: document.documentElement.classList.contains('dark') }">
                    <!-- Theme Toggle -->
                    <button @click="isDark = toggleTheme()" 
                            class="p-2.5 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-500 dark:text-gray-400 hover:text-indigo-600 transition duration-300">
                        <i x-show="!isDark" class="fas fa-moon text-xl"></i>
                        <i x-show="isDark" class="fas fa-sun text-xl" x-cloak></i>
                    </button>
                    <a href="cart.html" class="text-dark hover:text-blue-600 transition relative">
                        <i class="fas fa-shopping-cart text-xl"></i>
                        <span class="cart-badge absolute -top-2 -right-2 bg-blue-600 text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full">0</span>
                    </a>
                    <button @click="mobileMenu = !mobileMenu" class="md:hidden text-dark text-2xl"><i class="fas fa-bars"></i></button>
                </div>
            </div>
        </div>
    </nav>

    <main class="mesh-gradient-vibrant min-h-screen pt-32 pb-24 px-4 flex items-center">
        <div class="max-w-7xl mx-auto w-full">
            <template x-if="product">
                <div class="space-y-12">
                    <!-- Breadcrumbs -->
                    <nav class="glass px-8 py-4 rounded-3xl flex items-center space-x-3 text-sm font-bold border border-white/20 shadow-xl inline-flex">
                        <a href="index.html" class="text-gray-400 hover:text-indigo-400">Bosh sahifa</a>
                        <i class="fas fa-chevron-right text-[10px] text-gray-600"></i>
                        <a href="shop.html" class="text-gray-400 hover:text-indigo-400">Mahsulotlar</a>
                        <i class="fas fa-chevron-right text-[10px] text-gray-600"></i>
                        <span x-text="product.name" class="text-indigo-600"></span>
                    </nav>

                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-16 items-start">
                        <!-- Image Gallery -->
                        <div class="glass p-8 rounded-[4rem] border border-white/20 shadow-2xl relative overflow-hidden group">
                            <div class="absolute -top-32 -left-32 w-64 h-64 bg-indigo-600/10 rounded-full blur-[100px]"></div>
                            <div class="aspect-square rounded-[3rem] overflow-hidden bg-white/5 backdrop-blur-3xl shadow-inner">
                                <img :src="product.image" class="w-full h-full object-cover group-hover:scale-110 transition duration-1000">
                            </div>
                        </div>

                        <!-- Product Info -->
                        <div class="glass p-12 rounded-[4rem] border border-white/20 shadow-2xl relative overflow-hidden">
                            <div class="absolute -bottom-32 -right-32 w-64 h-64 bg-pink-600/10 rounded-full blur-[100px]"></div>
                            <div class="relative z-10">
                                <span x-text="product.category" class="inline-block px-6 py-2 bg-indigo-600 text-white text-[10px] font-black uppercase tracking-[0.3em] rounded-full mb-6 shadow-lg shadow-indigo-600/30"></span>
                                <h1 x-text="product.name" class="text-5xl md:text-6xl font-black text-dark dark:text-white mb-6 tracking-tighter leading-tight"></h1>
                                
                                <div class="flex items-center space-x-4 mb-8">
                                    <div class="flex text-yellow-400">
                                        <i class="fas fa-star"></i>
                                        <i class="fas fa-star"></i>
                                        <i class="fas fa-star"></i>
                                        <i class="fas fa-star"></i>
                                        <i class="fas fa-star-half-alt"></i>
                                    </div>
                                    <span class="text-gray-500 font-bold text-sm">(45 sharhlar)</span>
                                </div>

                                <p x-text="product.description" class="text-xl text-gray-500 dark:text-gray-400 mb-10 leading-relaxed font-medium"></p>

                                <div class="text-5xl font-black text-indigo-600 mb-10 tracking-tighter" x-text="formatPrice(product.price)"></div>

                                <div class="flex flex-col sm:flex-row gap-6">
                                    <div class="flex items-center glass rounded-3xl p-2 h-20 w-full sm:w-44 justify-between border border-white/20 shadow-inner">
                                        <button @click="if(quantity > 1) quantity--" class="w-14 h-14 rounded-2xl text-dark dark:text-white hover:bg-white/20 transition font-black text-2xl flex items-center justify-center">-</button>
                                        <span class="font-black text-2xl text-dark dark:text-white" x-text="quantity"></span>
                                        <button @click="quantity++" class="w-14 h-14 rounded-2xl text-dark dark:text-white hover:bg-white/20 transition font-black text-2xl flex items-center justify-center">+</button>
                                    </div>
                                    <button @click="addToCart(product.id); for(let i=1; i<quantity; i++) addToCart(product.id)" class="flex-1 bg-dark dark:bg-indigo-600 text-white h-20 rounded-[2rem] font-black text-xl hover:scale-[1.02] transition-all active:scale-95 shadow-2xl flex items-center justify-center space-x-4 tracking-tighter">
                                        <i class="fas fa-shopping-basket"></i>
                                        <span>Savatga qo'shish</span>
                                    </button>
                                </div>

                                <div class="grid grid-cols-2 gap-8 mt-12 border-t border-white/10 pt-12">
                                    <div class="flex items-start space-x-5">
                                        <div class="w-14 h-14 bg-indigo-600 text-white rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-600/30 flex-shrink-0">
                                            <i class="fas fa-truck-fast text-xl"></i>
                                        </div>
                                        <div>
                                            <h4 class="font-black text-dark dark:text-white text-lg">Tezkor yetkazish</h4>
                                            <p class="text-sm font-medium text-gray-500">24 soat ichida</p>
                                        </div>
                                    </div>
                                    <div class="flex items-start space-x-5">
                                        <div class="w-14 h-14 bg-pink-600 text-white rounded-2xl flex items-center justify-center shadow-lg shadow-pink-600/30 flex-shrink-0">
                                            <i class="fas fa-shield-halved text-xl"></i>
                                        </div>
                                        <div>
                                            <h4 class="font-black text-dark dark:text-white text-lg">Sifat kafolati</h4>
                                            <p class="text-sm font-medium text-gray-500">1 yillik rasmiy</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <script src="assets/js/main.js"></script>
</body>
</html>

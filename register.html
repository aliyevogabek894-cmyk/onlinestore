<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ro'yxatdan o'tish - Premium Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white w-full max-w-md rounded-[3rem] p-12 shadow-2xl">
        <div class="text-center mb-10">
            <a href="index.html" class="text-2xl font-black mb-6 block">PREMIUM STORE</a>
            <h1 class="text-3xl font-bold text-dark">Ro'yxatdan o'tish</h1>
            <p class="text-gray-400 mt-2">Yangi hisob yaratish uchun ma'lumotlarni kiriting.</p>
        </div>

        <form class="space-y-6" id="registerForm">
            <div class="space-y-2">
                <label class="font-bold text-dark ml-2">To'liq ismingiz</label>
                <input type="text" id="name" required class="w-full bg-gray-50 border-none rounded-2xl px-6 py-4 outline-none focus:ring-2 focus:ring-blue-600 transition">
            </div>
            <div class="space-y-2">
                <label class="font-bold text-dark ml-2">Email</label>
                <input type="email" id="email" required class="w-full bg-gray-50 border-none rounded-2xl px-6 py-4 outline-none focus:ring-2 focus:ring-blue-600 transition">
            </div>
            <div class="space-y-2">
                <label class="font-bold text-dark ml-2">Parol</label>
                <input type="password" id="password" required class="w-full bg-gray-50 border-none rounded-2xl px-6 py-4 outline-none focus:ring-2 focus:ring-blue-600 transition">
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-bold text-lg hover:bg-dark transition shadow-xl shadow-blue-600/20">
                Ro'yxatdan o'tish
            </button>
        </form>

        <script src="assets/js/db.js"></script>
        <script>
            document.getElementById('registerForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const name = document.getElementById('name').value;
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                db.registerUser({ name, email, password });
                alert("Muvaffaqiyatli ro'yxatdan o'tdingiz!");
                window.location.href = 'login.html';
            });
        </script>

        <p class="text-center mt-10 text-gray-500">
            Akkountingiz bormi? <a href="login.html" class="text-blue-600 font-bold">Kirish</a>
        </p>
    </div>
</body>
</html>

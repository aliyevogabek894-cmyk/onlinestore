<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ro'yxatdan o'tish - Premium Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="mesh-gradient-vibrant min-h-screen flex items-center justify-center p-6 lg:p-12 relative overflow-hidden">
    <div class="absolute inset-0 z-0 opacity-20 mesh-gradient-vibrant scale-150 -rotate-12"></div>
    <div class="glass w-full max-w-xl rounded-[4rem] p-16 shadow-2xl border border-white/20 relative z-10 overflow-hidden">
        <div class="absolute -bottom-32 -right-32 w-64 h-64 bg-pink-600/20 rounded-full blur-[100px]"></div>
        <div class="relative z-10">
            <div class="text-center mb-12">
                <a href="index.html" class="text-4xl font-black tracking-tighter text-indigo-600 mb-8 block">PREMIUM<span class="text-dark dark:text-white font-light ml-1 opacity-50">HUB</span></a>
                <h1 class="text-5xl font-black text-dark dark:text-white tracking-tighter mb-4">A'zo bo'lish</h1>
                <p class="text-gray-500 font-bold max-w-xs mx-auto text-lg leading-relaxed">Yangi hisob yaratish uchun ma'lumotlarni kiriting.</p>
            </div>

            <form class="space-y-6" id="registerForm">
                <div class="space-y-3">
                    <label class="font-black text-xs uppercase tracking-widest text-gray-500 ml-6">To'liq ismingiz</label>
                    <div class="relative">
                        <input type="text" id="name" required placeholder="Ismingizni kiriting" class="w-full glass p-5 rounded-3xl outline-none focus:ring-4 focus:ring-indigo-600/20 text-dark dark:text-white font-bold transition shadow-inner">
                        <i class="fas fa-user absolute right-8 top-1/2 -translate-y-1/2 text-gray-500"></i>
                    </div>
                </div>
                <div class="space-y-3">
                    <label class="font-black text-xs uppercase tracking-widest text-gray-500 ml-6">Elektron pochta</label>
                    <div class="relative">
                        <input type="email" id="email" required placeholder="example@mail.com" class="w-full glass p-5 rounded-3xl outline-none focus:ring-4 focus:ring-indigo-600/20 text-dark dark:text-white font-bold transition shadow-inner">
                        <i class="fas fa-envelope absolute right-8 top-1/2 -translate-y-1/2 text-gray-500"></i>
                    </div>
                </div>
                <div class="space-y-3">
                    <label class="font-black text-xs uppercase tracking-widest text-gray-500 ml-6">Maxfiy parol</label>
                    <div class="relative">
                        <input type="password" id="password" required placeholder="••••••••" class="w-full glass p-5 rounded-3xl outline-none focus:ring-4 focus:ring-indigo-600/20 text-dark dark:text-white font-bold transition shadow-inner">
                        <i class="fas fa-lock absolute right-8 top-1/2 -translate-y-1/2 text-gray-500"></i>
                    </div>
                </div>
                <button type="submit" class="w-full bg-dark dark:bg-indigo-600 text-white py-6 rounded-[2rem] font-black text-xl hover:scale-[1.02] active:scale-95 transition-all shadow-2xl shadow-indigo-600/30 tracking-tighter mt-4">
                    Ro'yxatdan o'tish
                </button>
            </form>

            <script src="assets/js/db.js"></script>
            <script>
                document.getElementById('registerForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    const name = document.getElementById('name').value;
                    const email = document.getElementById('email').value;
                    const password = document.getElementById('password').value;

                    db.registerUser({ name, email, password });
                    alert("Muvaffaqiyatli ro'yxatdan o'tdingiz!");
                    window.location.href = 'login.html';
                });
            </script>

            <p class="text-center mt-12 text-gray-500 font-bold">
                Akkountingiz bormi? <a href="login.html" class="text-indigo-600 dark:text-indigo-400 font-black border-b-2 border-indigo-600/20 hover:border-indigo-600 transition-all ml-2 pb-1">Tizimga kirish</a>
            </p>
        </div>
    </div>
</body>
</html>

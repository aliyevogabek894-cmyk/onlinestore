<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ro'yxatdan o'tish - Premium Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="assets/js/db.js"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        .z-input { border: 2px solid #e8e8e8; padding: 14px 16px; font-size: 14px; font-weight: 500; outline: none; transition: border-color 0.15s; width: 100%; border-radius: 0; }
        .z-input:focus { border-color: #1A6CDB; }
        .z-btn { background: #1A6CDB; color: white; font-weight: 800; font-size: 14px; padding: 16px; width: 100%; text-align: center; transition: background 0.15s; border-radius: 0; cursor: pointer; border: none; }
        .z-btn:hover { background: #1558b8; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-[#F2F2F2] min-h-screen" x-data="registerPage()">

    <header class="bg-white border-b border-gray-200">
        <div class="max-w-[1440px] mx-auto px-8 py-4 flex items-center justify-between">
            <a href="index.html" class="text-[22px] font-black tracking-[-0.04em] text-[#1B1B1B]">premium<span class="text-[#1A6CDB]">store</span></a>
            <div class="flex items-center gap-4 text-[12px] text-gray-500 font-medium">
                <i class="fas fa-lock text-green-500"></i>
                <span>Xavfsiz ulanish</span>
            </div>
        </div>
    </header>

    <main class="flex items-center justify-center min-h-[calc(100vh-73px)] py-12 px-4">
        <div class="w-full max-w-[480px]">
            <div class="bg-white border border-gray-200 shadow-sm p-10">
                <div class="text-center mb-8">
                    <h1 class="text-2xl font-black text-[#1B1B1B] tracking-tight">Yangi hisob yarating</h1>
                    <p class="text-sm text-gray-500 font-medium mt-2">Bepul yetkazish va 365 kun qaytarish imkoniyati</p>
                </div>

                <div x-show="error" x-cloak class="bg-red-50 border border-red-200 text-red-600 text-sm font-medium px-4 py-3 mb-4" x-text="error"></div>
                <div x-show="success" x-cloak class="bg-green-50 border border-green-200 text-green-700 text-sm font-medium px-4 py-3 mb-4">✅ Muvaffaqiyatli ro'yxatdan o'tdingiz! Kirish sahifasiga yo'naltirilmoqda...</div>

                <form @submit.prevent="register()" class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[11px] font-black uppercase tracking-widest text-gray-500 mb-2">Ism</label>
                            <input type="text" x-model="name" required class="z-input" placeholder="Alisher">
                        </div>
                        <div>
                            <label class="block text-[11px] font-black uppercase tracking-widest text-gray-500 mb-2">Familya</label>
                            <input type="text" x-model="surname" class="z-input" placeholder="Umarov">
                        </div>
                    </div>
                    <div>
                        <label class="block text-[11px] font-black uppercase tracking-widest text-gray-500 mb-2">Email manzil</label>
                        <input type="email" x-model="email" required class="z-input" placeholder="siz@example.com">
                    </div>
                    <div>
                        <label class="block text-[11px] font-black uppercase tracking-widest text-gray-500 mb-2">Parol</label>
                        <input type="password" x-model="password" required minlength="6" class="z-input" placeholder="Kamida 6 belgi">
                    </div>
                    <div>
                        <label class="block text-[11px] font-black uppercase tracking-widest text-gray-500 mb-2">Parolni tasdiqlang</label>
                        <input type="password" x-model="confirm" required class="z-input" placeholder="Parolni qaytaring">
                    </div>
                    <div class="flex items-start gap-3 pt-1">
                        <input type="checkbox" x-model="agreed" id="terms" class="mt-1 w-4 h-4 accent-[#1A6CDB] flex-shrink-0">
                        <label for="terms" class="text-xs text-gray-500 font-medium cursor-pointer leading-relaxed">
                            <a href="#" class="text-[#1A6CDB] hover:underline">Foydalanish shartlari</a> va <a href="#" class="text-[#1A6CDB] hover:underline">Maxfiylik siyosati</a> bilan roziman
                        </label>
                    </div>
                    <button type="submit" class="z-btn mt-2">Hisob yaratish</button>
                </form>

                <div class="border-t border-gray-100 mt-8 pt-6 text-center">
                    <p class="text-sm text-gray-500">Hisobingiz bormi? <a href="login.html" class="font-bold text-[#1A6CDB] hover:underline">Kirish</a></p>
                </div>
            </div>

            <div class="flex items-center justify-center gap-8 mt-8 text-[11px] text-gray-400 font-medium">
                <span><i class="fas fa-shield-alt text-green-500 mr-1"></i> 256-bit SSL</span>
                <span><i class="fas fa-gift text-blue-500 mr-1"></i> Bepul yetkazish</span>
                <span><i class="fas fa-undo text-orange-400 mr-1"></i> 365 kun qaytarish</span>
            </div>
        </div>
    </main>

    <script>
        function registerPage() {
            return {
                name: '', surname: '', email: '', password: '', confirm: '', agreed: false, error: '', success: false,
                register() {
                    this.error = '';
                    if (!this.agreed) { this.error = 'Shartlarga rozilik bildiring.'; return; }
                    if (this.password !== this.confirm) { this.error = 'Parollar mos kelmadi.'; return; }
                    if (this.password.length < 6) { this.error = 'Parol kamida 6 belgi bo\'lishi kerak.'; return; }
                    const users = db.getUsers();
                    if (users.find(u => u.email === this.email)) { this.error = 'Bu email allaqachon ro\'yxatdan o\'tgan.'; return; }
                    const fullName = this.surname ? this.name + ' ' + this.surname : this.name;
                    const newUser = db.addUser({ name: fullName, email: this.email, password: this.password, role: 'user', joinedDate: new Date().toLocaleDateString('uz-UZ') });
                    this.success = true;
                    setTimeout(() => window.location.href = 'login.html', 1800);
                }
            }
        }
    </script>
</body>
</html>

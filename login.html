<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirish - Premium Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="assets/js/db.js"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="dark-mode min-h-screen" x-data="loginPage()">

    <!-- Minimal Header -->
    <header class="glass-header">
        <div class="max-w-[1440px] mx-auto px-8 py-4 flex items-center justify-between">
            <a href="index.html" class="text-[22px] font-black tracking-[-0.04em] ">premium<span class="text-[#1A6CDB]">store</span></a>
            <div class="flex items-center gap-4 text-[12px] text-[#94A3B8] font-medium">
                <i class="fas fa-lock text-green-500"></i>
                <span>Xavfsiz ulanish</span>
            </div>
        </div>
    </header>

    <main class="flex items-center justify-center min-h-[calc(100vh-73px)] py-12 px-4">
        <div class="w-full max-w-[440px]">
            <!-- Card -->
            <div class="glass-card border border-white/10 shadow-sm p-10">
                <div class="text-center mb-8">
                    <h1 class="text-2xl font-black  tracking-tight">Hisobingizga kiring</h1>
                    <p class="text-sm text-[#94A3B8] font-medium mt-2">Buyurtma tarixi va maqomingizni ko'ring</p>
                </div>

                <!-- Error/Success messages -->
                <div x-show="error" x-cloak class="bg-red-50 border border-red-200 text-red-600 text-sm font-medium px-4 py-3 mb-6" x-text="error"></div>

                <form @submit.prevent="login()" class="space-y-4">
                    <div>
                        <label class="block text-[11px] font-black uppercase tracking-widest text-[#94A3B8] mb-2">Email manzil</label>
                        <input type="email" x-model="email" required class="z-input" placeholder="siz@example.com">
                    </div>
                    <div>
                        <label class="block text-[11px] font-black uppercase tracking-widest text-[#94A3B8] mb-2">Parol</label>
                        <div class="relative">
                            <input :type="showPass ? 'text' : 'password'" x-model="password" required class="z-input pr-12" placeholder="вЂўвЂўвЂўвЂўвЂўвЂўвЂўвЂў">
                            <button type="button" @click="showPass = !showPass" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-[#94A3B8]">
                                <i :class="showPass ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
                            </button>
                        </div>
                    </div>
                    <div class="flex items-center justify-between pt-1">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="w-4 h-4 accent-[#1A6CDB]">
                            <span class="text-sm text-[#94A3B8] font-medium">Eslab qol</span>
                        </label>
                        <a href="#" class="text-sm font-semibold text-[#1A6CDB] hover:underline">Parolni unutdim?</a>
                    </div>
                    <button type="submit" class="z-btn mt-4">Kirish</button>
                </form>

                <div class="border-t border-white/5 mt-8 pt-6 text-center">
                    <p class="text-sm text-[#94A3B8]">Hisobingiz yo'qmi? <a href="register.html" class="font-bold text-[#1A6CDB] hover:underline">Ro'yxatdan o'tish</a></p>
                </div>
            </div>

            <!-- Trust signals -->
            <div class="flex items-center justify-center gap-8 mt-8 text-[11px] text-gray-400 font-medium">
                <span><i class="fas fa-shield-alt text-green-500 mr-1"></i> 256-bit SSL</span>
                <span><i class="fas fa-lock text-green-500 mr-1"></i> Xavfsiz</span>
                <span><i class="fas fa-user-shield text-green-500 mr-1"></i> Maxfiy</span>
            </div>
        </div>
    </main>

    <script>
        function loginPage() {
            return {
                email: '',
                password: '',
                error: '',
                showPass: false,
                login() {
                    this.error = '';
                    const users = db.getUsers();
                    const emailNorm = this.email.trim().toLowerCase();
                    const user = users.find(u => (u.email || '').toLowerCase() === emailNorm && u.password === this.password);
                    if (!user) { this.error = 'Email yoki parol noto\'g\'ri. Iltimos, tekshirib ko\'ring.'; return; }
                    localStorage.setItem('ps_current_user', JSON.stringify(user));
                    window.location.href = user.role === 'admin' ? 'admin.html' : 'index.html';
                }
            }
        }
    </script>
</body>
</html>

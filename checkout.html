<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buyurtma - Premium Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="assets/js/db.js"></script>
</head>
<body class="bg-gray-50" x-data="{ 
    cart: JSON.parse(localStorage.getItem('cart')) || [],
    get totalPrice() {
        return this.cart.reduce((sum, item) => sum + (item.price * item.quantity), 0)
    },
    formatPrice(price) {
        return new Intl.NumberFormat('uz-UZ').format(price) + ' so\'m';
    }
}">
    <nav class="h-24 flex items-center px-8 max-w-7xl mx-auto">
        <a href="index.html" class="text-2xl font-black tracking-tighter">PREMIUM STORE</a>
    </nav>

    <main class="py-12 max-w-4xl mx-auto px-4">
        <div class="bg-white rounded-[3rem] p-12 shadow-2xl">
            <div class="text-center mb-12">
                <h1 class="text-4xl font-black text-dark mb-4">Rasmiylashtirish</h1>
                <p class="text-gray-400">Ma'lumotlaringizni kiriting va biz siz bilan bog'lanamiz.</p>
            </div>

            <form onsubmit="event.preventDefault(); alert('Buyurtmangiz qabul qilindi! Operatormiz tez orada bog\'lanadi.'); localStorage.removeItem('cart'); window.location.href='index.html';" class="space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="space-y-2">
                        <label class="font-bold text-dark ml-2">Ismingiz</label>
                        <input type="text" required placeholder="Ali Valiyev" class="w-full bg-gray-50 border-none rounded-2xl px-6 py-4 outline-none focus:ring-2 focus:ring-blue-600 transition">
                    </div>
                    <div class="space-y-2">
                        <label class="font-bold text-dark ml-2">Telefon raqamingiz</label>
                        <input type="tel" required placeholder="+998 90 123 45 67" class="w-full bg-gray-50 border-none rounded-2xl px-6 py-4 outline-none focus:ring-2 focus:ring-blue-600 transition">
                    </div>
                </div>
                
                <div class="space-y-2">
                    <label class="font-bold text-dark ml-2">Manzilingiz</label>
                    <textarea required rows="3" placeholder="Toshkent shahri, Yunusobod tumani..." class="w-full bg-gray-50 border-none rounded-2xl px-6 py-4 outline-none focus:ring-2 focus:ring-blue-600 transition"></textarea>
                </div>

                <div class="bg-blue-50 p-8 rounded-[2rem] border border-blue-100 mb-8">
                    <div class="flex justify-between items-center mb-4">
                        <div class="flex items-center space-x-4">
                            <div class="w-10 h-10 bg-blue-600 text-white rounded-full flex items-center justify-center"><i class="fas fa-shopping-bag"></i></div>
                            <h3 class="font-bold text-blue-900">Jami summa</h3>
                        </div>
                        <span class="text-2xl font-black text-blue-900" x-text="formatPrice(totalPrice)"></span>
                    </div>
                    <p class="text-blue-700">Hozirda faqat mahsulotni olgandan so'ng naqd yoki karta orqali to'lov mavjud.</p>
                </div>

                <button type="submit" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-xl hover:bg-dark transition shadow-xl shadow-blue-600/20">
                    Buyurtmani tasdiqlash
                </button>
            </form>
        </div>
    </main>
</body>
</html>

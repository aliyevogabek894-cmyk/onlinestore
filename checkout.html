<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buyurtma - Premium Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="assets/js/db.js"></script>
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="mesh-gradient-vibrant min-h-screen flex flex-col relative overflow-x-hidden" x-data="{ 
    cart: JSON.parse(localStorage.getItem('cart')) || [],
    get totalPrice() {
        return this.cart.reduce((sum, item) => sum + (item.price * item.quantity), 0)
    },
    formatPrice(price) {
        return new Intl.NumberFormat('uz-UZ').format(price) + ' so\'m';
    }
}">
    <nav class="glass fixed w-full z-40 transition-all duration-500">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-24 flex justify-between items-center">
            <a href="index.html" class="text-4xl font-black tracking-tighter text-indigo-600 drop-shadow-sm">PREMIUM<span class="text-dark dark:text-white font-light ml-1 opacity-50">HUB</span></a>
            <div x-data="{ isDark: document.documentElement.classList.contains('dark') }">
                <button @click="isDark = toggleTheme()" 
                        class="p-3 rounded-2xl glass hover:bg-white/20 text-gray-500 dark:text-gray-400 hover:text-indigo-600 transition-all duration-300 shadow-xl border border-white/20">
                    <i x-show="!isDark" class="fas fa-moon text-xl"></i>
                    <i x-show="isDark" class="fas fa-sun text-xl" x-cloak></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="flex-1 pt-40 pb-24 px-4 flex items-center justify-center relative">
        <div class="absolute inset-0 opacity-20 mesh-gradient-vibrant scale-125 rotate-6"></div>
        <div class="glass w-full max-w-4xl rounded-[4rem] p-12 md:p-16 shadow-2xl border border-white/20 relative z-10 overflow-hidden">
            <div class="absolute -top-32 -left-32 w-64 h-64 bg-indigo-600/10 rounded-full blur-[100px]"></div>
            
            <div class="relative z-10">
                <div class="text-center mb-16">
                    <h1 class="text-6xl font-black text-dark dark:text-white tracking-tighter mb-4">Rasmiylashtirish</h1>
                    <p class="text-gray-500 font-bold text-xl leading-relaxed max-w-lg mx-auto">Ma'lumotlaringizni kiriting va biz siz bilan tez orada bog'lanamiz.</p>
                </div>

                <form onsubmit="event.preventDefault(); alert('Buyurtmangiz qabul qilindi! Operatormiz tez orada bog\'lanadi.'); localStorage.removeItem('cart'); window.location.href='index.html';" class="space-y-12">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                        <div class="space-y-4">
                            <label class="font-black text-xs uppercase tracking-[0.2em] text-gray-500 ml-6">To'liq ismingiz</label>
                            <div class="relative">
                                <input type="text" required placeholder="Ali Valiyev" class="w-full glass p-6 rounded-3xl outline-none focus:ring-4 focus:ring-indigo-600/20 text-dark dark:text-white font-bold transition shadow-inner">
                                <i class="fas fa-user absolute right-8 top-1/2 -translate-y-1/2 text-gray-500"></i>
                            </div>
                        </div>
                        <div class="space-y-4">
                            <label class="font-black text-xs uppercase tracking-[0.2em] text-gray-500 ml-6">Telefon raqamingiz</label>
                            <div class="relative">
                                <input type="tel" required placeholder="+998 90 123 45 67" class="w-full glass p-6 rounded-3xl outline-none focus:ring-4 focus:ring-indigo-600/20 text-dark dark:text-white font-bold transition shadow-inner">
                                <i class="fas fa-phone absolute right-8 top-1/2 -translate-y-1/2 text-gray-500"></i>
                            </div>
                        </div>
                    </div>
                    
                    <div class="space-y-4">
                        <label class="font-black text-xs uppercase tracking-[0.2em] text-gray-500 ml-6">Yetkazib berish manzili</label>
                        <div class="relative">
                            <textarea required rows="3" placeholder="Toshkent shahri, Yunusobod tumani..." class="w-full glass p-6 rounded-3xl outline-none focus:ring-4 focus:ring-indigo-600/20 text-dark dark:text-white font-bold transition shadow-inner"></textarea>
                            <i class="fas fa-location-dot absolute right-8 top-10 text-gray-500"></i>
                        </div>
                    </div>

                    <div class="glass p-10 rounded-[3rem] border border-white/20 shadow-inner bg-white/5 relative overflow-hidden group">
                        <div class="absolute -right-24 -bottom-24 w-48 h-48 bg-indigo-600/10 rounded-full blur-3xl"></div>
                        <div class="flex flex-col md:flex-row justify-between items-center gap-6 relative z-10">
                            <div class="flex items-center space-x-6">
                                <div class="w-16 h-16 bg-indigo-600 text-white rounded-[1.5rem] flex items-center justify-center shadow-2xl shadow-indigo-600/40 transform group-hover:rotate-12 transition duration-500">
                                    <i class="fas fa-shopping-basket text-2xl"></i>
                                </div>
                                <div>
                                    <p class="text-gray-500 text-[10px] font-black uppercase tracking-[0.3em] mb-1">To'lov miqdori</p>
                                    <h3 class="text-4xl font-black text-dark dark:text-white tracking-tighter" x-text="formatPrice(totalPrice)"></h3>
                                </div>
                            </div>
                            <div class="text-center md:text-right">
                                <span class="px-6 py-2 bg-green-500/10 text-green-500 rounded-full text-xs font-black uppercase tracking-widest border border-green-500/20">Naqd yoki karta orqali</span>
                                <p class="text-sm font-bold text-gray-500 mt-3">Qabul qilganda to'lov</p>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-dark dark:bg-indigo-600 text-white py-8 rounded-[2.5rem] font-black text-2xl hover:scale-[1.02] active:scale-95 transition-all shadow-2xl shadow-indigo-600/30 tracking-tighter">
                        Buyurtmani tasdiqlash
                    </button>
                    <p class="text-center text-[10px] text-gray-500 font-black uppercase tracking-[0.4em]">Xarid uchun tashakkur!</p>
                </form>
            </div>
        </div>
    </main>
    <script src="assets/js/main.js"></script>
</body>
</body>
</html>

<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil - Premium Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="assets/js/db.js"></script>
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body x-data="profilePage()" class="mesh-gradient-vibrant min-h-screen">
    <nav class="glass fixed w-full z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex justify-between items-center">
            <a href="index.html" class="text-3xl font-extrabold tracking-tighter text-indigo-600">PREMIUM<span class="text-dark dark:text-white font-light ml-1 opacity-50">HUB</span></a>
            <div class="flex items-center space-x-8">
                <div x-data="{ isDark: document.documentElement.classList.contains('dark') }">
                    <button @click="isDark = toggleTheme()" 
                            class="p-2.5 rounded-2xl glass hover:bg-white/20 text-gray-500 dark:text-gray-400 hover:text-indigo-600 transition duration-300">
                        <i x-show="!isDark" class="fas fa-moon text-xl"></i>
                        <i x-show="isDark" class="fas fa-sun text-xl" x-cloak></i>
                    </button>
                </div>
                <a href="index.html" class="text-dark dark:text-white font-bold hover:text-indigo-600 transition">Bosh sahifa</a>
                <button @click="logout()" class="text-red-500 font-black hover:scale-105 transition-all">Chiqish</button>
            </div>
        </div>
    </nav>
    
    <script src="assets/js/main.js"></script>

    <main class="pt-32 pb-24 px-4">
        <div class="max-w-4xl mx-auto">
            <template x-if="user">
                <div class="space-y-12">
                    <!-- Profile Header -->
                    <div class="glass p-12 rounded-[4rem] border border-white/20 shadow-2xl flex flex-col md:flex-row items-center space-y-8 md:space-y-0 md:space-x-12 relative overflow-hidden">
                        <div class="absolute -top-32 -left-32 w-64 h-64 bg-indigo-600/10 rounded-full blur-[100px]"></div>
                        <div class="w-40 h-40 bg-indigo-600 text-white rounded-[3rem] flex items-center justify-center text-6xl font-black shadow-2xl shadow-indigo-600/30 relative z-10" x-text="user.name.charAt(0)"></div>
                        <div class="flex-1 text-center md:text-left relative z-10">
                            <h1 x-text="user.name" class="text-5xl font-black text-dark dark:text-white mb-3 tracking-tighter"></h1>
                            <p x-text="user.email" class="text-gray-500 font-bold text-xl mb-6"></p>
                            <span class="px-6 py-2 bg-indigo-600 text-white rounded-full text-xs font-black uppercase tracking-widest shadow-lg shadow-indigo-600/20">Premium Mijoz</span>
                        </div>
                        <div class="glass rounded-[2rem] p-8 text-center backdrop-blur-3xl relative z-10 items-center justify-center flex flex-col">
                            <p class="text-gray-500 text-[10px] font-black uppercase tracking-[0.3em] mb-3">A'zo bo'ldi</p>
                            <p x-text="user.joinedDate" class="font-black text-2xl text-dark dark:text-white tracking-tighter"></p>
                        </div>
                    </div>

                    <!-- Statistics -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                        <div class="glass p-10 rounded-[3rem] border border-white/20 shadow-2xl text-center group hover:scale-105 transition-all duration-500 relative overflow-hidden">
                            <div class="absolute -bottom-12 -right-12 w-24 h-24 bg-indigo-600/10 rounded-full blur-3xl"></div>
                            <div class="w-16 h-16 bg-indigo-600 text-white rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-indigo-600/20 group-hover:rotate-12 transition duration-500">
                                <i class="fas fa-shopping-basket text-2xl"></i>
                            </div>
                            <h3 class="text-4xl font-black text-dark dark:text-white tracking-tighter">0</h3>
                            <p class="text-gray-500 font-bold uppercase tracking-widest text-[10px] mt-2">Buyurtmalar</p>
                        </div>
                        <div class="glass p-10 rounded-[3rem] border border-white/20 shadow-2xl text-center group hover:scale-105 transition-all duration-500 relative overflow-hidden">
                            <div class="absolute -bottom-12 -right-12 w-24 h-24 bg-pink-600/10 rounded-full blur-3xl"></div>
                            <div class="w-16 h-16 bg-pink-600 text-white rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-pink-600/20 group-hover:rotate-12 transition duration-500">
                                <i class="fas fa-heart text-2xl"></i>
                            </div>
                            <h3 class="text-4xl font-black text-dark dark:text-white tracking-tighter">12</h3>
                            <p class="text-gray-500 font-bold uppercase tracking-widest text-[10px] mt-2">Sevimlilar</p>
                        </div>
                        <div class="glass p-10 rounded-[3rem] border border-white/20 shadow-2xl text-center group hover:scale-105 transition-all duration-500 relative overflow-hidden">
                            <div class="absolute -bottom-12 -right-12 w-24 h-24 bg-cyan-600/10 rounded-full blur-3xl"></div>
                            <div class="w-16 h-16 bg-cyan-600 text-white rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-cyan-600/20 group-hover:rotate-12 transition duration-500">
                                <i class="fas fa-ticket text-2xl"></i>
                            </div>
                            <h3 class="text-4xl font-black text-dark dark:text-white tracking-tighter">3</h3>
                            <p class="text-gray-500 font-bold uppercase tracking-widest text-[10px] mt-2">Kuponlar</p>
                        </div>
                    </div>

                    <!-- Recent Orders Section -->
                    <div class="glass p-12 rounded-[4rem] border border-white/20 shadow-2xl relative overflow-hidden">
                        <div class="absolute -top-32 -right-32 w-64 h-64 bg-indigo-600/5 rounded-full blur-[100px]"></div>
                        <h2 class="text-3xl font-black text-dark dark:text-white mb-10 tracking-tighter relative z-10">Oxirgi buyurtmalar</h2>
                        <div class="relative z-10 text-center py-16">
                            <div class="w-24 h-24 glass rounded-full flex items-center justify-center mx-auto mb-8 shadow-inner">
                                <i class="fas fa-box-open text-5xl text-gray-500 opacity-30"></i>
                            </div>
                            <p class="text-xl font-bold text-gray-500 mb-8">Sizda hali buyurtmalar mavjud emas.</p>
                            <a href="shop.html" class="inline-block bg-dark dark:bg-indigo-600 text-white px-12 py-5 rounded-[2rem] font-black text-lg hover:scale-105 transition-all shadow-xl shadow-indigo-600/20 tracking-tighter">Xaridni boshlash</a>
                        </div>
                    </div>
                </div>
            </template>
            <template x-if="!user">
                <div class="glass p-24 rounded-[5rem] border border-white/20 shadow-2xl text-center relative overflow-hidden">
                    <div class="absolute inset-0 opacity-10 bg-indigo-600 blur-[150px]"></div>
                    <div class="relative z-10">
                        <i class="fas fa-lock text-7xl text-indigo-600/30 mb-10"></i>
                        <h2 class="text-5xl font-black text-dark dark:text-white mb-6 tracking-tighter">Kirish kutilmoqda</h2>
                        <p class="text-xl text-gray-500 font-bold mb-12 max-w-sm mx-auto leading-relaxed">Profil ma'lumotlarini ko'rish uchun iltimos tizimga kiring.</p>
                        <a href="login.html" class="bg-indigo-600 text-white px-16 py-6 rounded-[2rem] font-black text-2xl shadow-2xl shadow-indigo-600/40 hover:scale-110 transition-all tracking-tighter">Tizimga kirish</a>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <script>
        function profilePage() {
            const user = JSON.parse(localStorage.getItem('ps_current_user'));
            return {
                user: user,
                logout() {
                    localStorage.removeItem('ps_current_user');
                    window.location.href = 'index.html';
                }
            }
        }
    </script>
</body>
</html>

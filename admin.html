<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Premium Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="assets/js/db.js"></script>
    <script>
        // Strict Admin Access Check
        const user = JSON.parse(localStorage.getItem('ps_current_user'));
        if (!user || user.role !== 'admin') {
            window.location.href = 'login.html';
        }
    </script>
</head>
<body x-data="adminPanel()" class="bg-bg-secondary min-h-screen font-sans flex text-gray-900">
    <!-- Sidebar -->
    <aside class="w-72 bg-gray-900 text-white flex flex-col fixed h-full z-50">
        <div class="p-8 border-b border-gray-800">
            <h1 class="text-2xl font-black tracking-tighter serif italic">ADMIN<span class="not-italic font-normal text-blue-400">.HUB</span></h1>
            <p class="text-[9px] font-black uppercase tracking-[0.3em] text-gray-500 mt-2">Boshqaruv Paneli</p>
        </div>
        
        <nav class="flex-1 p-6 space-y-2">
            <button @click="view = 'dashboard'" :class="view === 'dashboard' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800 hover:text-white'" class="w-full flex items-center space-x-4 px-4 py-3 font-black text-xs uppercase tracking-widest transition">
                <i class="fas fa-th-large"></i>
                <span>Dashboard</span>
            </button>
            <button @click="view = 'products'" :class="view === 'products' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800 hover:text-white'" class="w-full flex items-center space-x-4 px-4 py-3 font-black text-xs uppercase tracking-widest transition">
                <i class="fas fa-box"></i>
                <span>Mahsulotlar</span>
            </button>
            <button @click="view = 'users'" :class="view === 'users' ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800 hover:text-white'" class="w-full flex items-center space-x-4 px-4 py-3 font-black text-xs uppercase tracking-widest transition">
                <i class="fas fa-users"></i>
                <span>Foydalanuvchilar</span>
            </button>
        </nav>

        <div class="p-6 border-t border-gray-800">
            <a href="index.html" class="flex items-center space-x-4 px-4 py-3 text-gray-400 hover:text-white transition font-black text-xs uppercase tracking-widest">
                <i class="fas fa-external-link-alt"></i>
                <span>Saytga o'tish</span>
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 ml-72 p-12">
        <!-- Header -->
        <header class="flex justify-between items-center mb-12">
            <div>
                <h2 class="text-3xl font-black serif italic text-gray-900 uppercase tracking-tighter" x-text="viewTitle()"></h2>
                <div class="h-1 w-20 bg-blue-600 mt-2"></div>
            </div>
            <div class="flex items-center space-x-6">
                <div class="text-right">
                    <p class="text-xs font-black uppercase tracking-widest text-gray-900" x-text="user ? user.name : 'Admin'"></p>
                    <p class="text-[10px] font-bold text-blue-500 uppercase tracking-widest">Bosh Administrator</p>
                </div>
                <img :src="'https://ui-avatars.com/api/?name=' + (user ? user.name : 'Admin') + '&background=003953&color=fff'" class="w-12 h-12 shadow-xl border-2 border-white">
            </div>
        </header>

        <!-- View: Dashboard -->
        <template x-if="view === 'dashboard'">
            <div class="space-y-10">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    <div class="bg-white p-8 border border-gray-200 shadow-sm">
                        <p class="text-[10px] font-black uppercase tracking-widest text-gray-400 mb-4">Sotuvlar (Bugun)</p>
                        <h3 class="text-4xl font-black serif italic text-gray-900">2,450,000 <span class="text-xs not-italic font-bold text-gray-400">so'm</span></h3>
                        <div class="mt-4 flex items-center text-green-500 text-xs font-black">
                            <i class="fas fa-arrow-up mr-2"></i> 12% o'sish
                        </div>
                    </div>
                    <div class="bg-white p-8 border border-gray-200 shadow-sm">
                        <p class="text-[10px] font-black uppercase tracking-widest text-gray-400 mb-4">Buyurtmalar</p>
                        <h3 class="text-4xl font-black serif italic text-gray-900">142</h3>
                        <div class="mt-4 flex items-center text-blue-500 text-xs font-black">
                            <i class="fas fa-shopping-bag mr-2"></i> +8 yangi
                        </div>
                    </div>
                    <div class="bg-white p-8 border border-gray-200 shadow-sm">
                        <p class="text-[10px] font-black uppercase tracking-widest text-gray-400 mb-4">Mijozlar</p>
                        <h3 class="text-4xl font-black serif italic text-gray-900" x-text="users.length"></h3>
                        <div class="mt-4 flex items-center text-blue-500 text-xs font-black">
                            <i class="fas fa-users mr-2"></i> Aktiv
                        </div>
                    </div>
                </div>

                <div class="bg-white border border-gray-200 p-8 shadow-sm">
                    <h3 class="text-sm font-black uppercase tracking-widest text-gray-900 mb-8 border-b border-gray-50 pb-4">Tizim holati</h3>
                    <div class="h-64 flex items-center justify-center bg-gray-50 border border-dashed border-gray-200">
                        <p class="text-[10px] font-black uppercase tracking-[0.3em] text-gray-400">Statistika grafikka tayyorlanmoqda...</p>
                    </div>
                </div>
            </div>
        </template>

        <!-- View: Products -->
        <template x-if="view === 'products'">
            <div class="space-y-8">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                    <div class="relative w-full md:w-96">
                        <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="text" x-model="adminSearch" placeholder="Qidirish..." class="w-full pl-12 pr-4 py-3 border border-gray-200 outline-none focus:border-blue-600 text-xs font-bold uppercase tracking-widest">
                    </div>
                    <button @click="showAddModal = true" class="bg-gray-900 text-white px-8 py-3 font-black uppercase tracking-widest text-[10px] hover:bg-blue-600 transition shadow-lg">
                        Yangi mahsulot
                    </button>
                </div>

                <div class="bg-white border border-gray-200 shadow-sm overflow-hidden">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-gray-50 border-b border-gray-100">
                                <th class="px-8 py-4 text-[10px] font-black uppercase tracking-widest text-gray-400">Rasm</th>
                                <th class="px-8 py-4 text-[10px] font-black uppercase tracking-widest text-gray-400">Nomi</th>
                                <th class="px-8 py-4 text-[10px] font-black uppercase tracking-widest text-gray-400">Kategoriya</th>
                                <th class="px-8 py-4 text-[10px] font-black uppercase tracking-widest text-gray-400">Narxi</th>
                                <th class="px-8 py-4 text-[10px] font-black uppercase tracking-widest text-gray-400 text-right">Amallar</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-50">
                            <template x-for="product in filteredProducts()" :key="product.id">
                                <tr class="hover:bg-gray-50/50 transition">
                                    <td class="px-8 py-4">
                                        <img :src="product.image" class="w-12 h-12 object-contain bg-white border border-gray-100">
                                    </td>
                                    <td class="px-8 py-4">
                                        <p class="text-xs font-black text-gray-900" x-text="product.name"></p>
                                        <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest" x-text="'ID: #' + product.id"></p>
                                    </td>
                                    <td class="px-8 py-4 text-[10px] font-black uppercase tracking-widest text-gray-500" x-text="product.category"></td>
                                    <td class="px-8 py-4">
                                        <input type="number" x-model="product.price" @change="updatePrice(product)" class="bg-gray-50 border border-gray-200 px-3 py-1 w-32 text-xs font-black text-gray-900 outline-none focus:border-blue-600">
                                    </td>
                                    <td class="px-8 py-4 text-right">
                                        <button @click="deleteProduct(product.id)" class="text-red-400 hover:text-red-600 transition p-2">
                                            <i class="fas fa-trash-alt"></i>
                                        </button>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </div>
        </template>

        <!-- View: Users -->
        <template x-if="view === 'users'">
            <div class="space-y-8">
                <div class="flex justify-between items-center">
                    <p class="text-xs font-black uppercase tracking-widest text-gray-500" x-text="users.length + ' ta foydalanuvchi'"></p>
                    <button @click="exportUsers()" class="text-blue-600 font-black text-[10px] uppercase tracking-widest hover:underline">CSV Export</button>
                </div>
                <div class="bg-white border border-gray-200 shadow-sm overflow-hidden">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-gray-50 border-b border-gray-100">
                                <th class="px-8 py-4 text-[10px] font-black uppercase tracking-widest text-gray-400">Ism</th>
                                <th class="px-8 py-4 text-[10px] font-black uppercase tracking-widest text-gray-400">Email</th>
                                <th class="px-8 py-4 text-[10px] font-black uppercase tracking-widest text-gray-400">Roli</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-50">
                            <template x-for="u in users">
                                <tr class="hover:bg-gray-50/50">
                                    <td class="px-8 py-6 font-black text-xs text-gray-900" x-text="u.name"></td>
                                    <td class="px-8 py-6 font-bold text-xs text-gray-500" x-text="u.email"></td>
                                    <td class="px-8 py-6">
                                        <span :class="u.role === 'admin' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-500'" class="px-3 py-1 text-[9px] font-black uppercase tracking-widest" x-text="u.role"></span>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </div>
        </template>
    </main>

    <!-- Modal: Add Product -->
    <template x-if="showAddModal">
        <div class="fixed inset-0 bg-gray-900/40 backdrop-blur-sm z-[100] flex items-center justify-center p-6">
            <div @click.away="showAddModal = false" class="bg-white max-w-xl w-full p-10 border border-gray-200 shadow-2xl">
                <h3 class="text-xl font-black serif italic text-gray-900 uppercase tracking-tighter mb-10">Yangi mahsulot qo'shish</h3>
                <form @submit.prevent="saveNewProduct()" class="space-y-6">
                    <div class="grid grid-cols-2 gap-6">
                        <div class="col-span-2 space-y-2">
                            <label class="text-[10px] font-black uppercase tracking-widest text-gray-400">Nomi</label>
                            <input type="text" x-model="newProduct.name" required class="w-full border border-gray-200 px-4 py-3 outline-none focus:border-blue-600 text-xs font-bold uppercase tracking-widest">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black uppercase tracking-widest text-gray-400">Kategoriya</label>
                            <select x-model="newProduct.category" class="w-full border border-gray-200 px-4 py-3 outline-none focus:border-blue-600 text-xs font-black uppercase tracking-widest">
                                <option value="Phones">Telefonlar</option>
                                <option value="Laptops">Noutbuklar</option>
                                <option value="Audio">Audio</option>
                                <option value="Gaming">Geyming</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black uppercase tracking-widest text-gray-400">Narxi (so'm)</label>
                            <input type="number" x-model="newProduct.price" required class="w-full border border-gray-200 px-4 py-3 outline-none focus:border-blue-600 text-xs font-bold uppercase tracking-widest">
                        </div>
                        <div class="col-span-2 space-y-2">
                            <label class="text-[10px] font-black uppercase tracking-widest text-gray-400">Rasm URL</label>
                            <input type="text" x-model="newProduct.image" required class="w-full border border-gray-200 px-4 py-3 outline-none focus:border-blue-600 text-xs font-bold uppercase tracking-widest">
                        </div>
                    </div>
                    <div class="flex gap-4 pt-6">
                        <button type="button" @click="showAddModal = false" class="flex-1 py-4 border border-gray-200 font-black text-[10px] uppercase tracking-[0.2em] hover:bg-gray-50 transition">Bekor qilish</button>
                        <button type="submit" class="flex-1 py-4 bg-blue-600 text-white font-black text-[10px] uppercase tracking-[0.2em] hover:bg-blue-700 transition shadow-lg">Saqlash</button>
                    </div>
                </form>
            </div>
        </div>
    </template>

    <script>
        function adminPanel() {
            return {
                user: JSON.parse(localStorage.getItem('ps_current_user')),
                view: 'dashboard',
                products: db.getProducts(),
                users: db.getUsers(),
                adminSearch: '',
                showAddModal: false,
                newProduct: {
                    name: '',
                    category: 'Phones',
                    price: '',
                    image: 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500&q=80',
                    description: 'Premium mahsulot.',
                    stock: 10
                },
                filteredProducts() {
                    const q = this.adminSearch.toLowerCase();
                    return this.products.filter(p => {
                        const nameMatch = p.name.toLowerCase().includes(q);
                        const catMatch = p.category.toLowerCase().includes(q);
                        return nameMatch || catMatch;
                    });
                },
                viewTitle() {
                    return {
                        'dashboard': 'Dashboard Overview',
                        'products': 'Product Management',
                        'users': 'User Database'
                    }[this.view];
                },
                updatePrice(product) {
                    db.updateProduct(product);
                    alert("Narx yangilandi!");
                },
                deleteProduct(id) {
                    if (confirm("Mahsulotni o'chirishni tasdiqlaysizmi?")) {
                        db.deleteProduct(id);
                        this.products = db.getProducts();
                    }
                },
                saveNewProduct() {
                    db.addProduct({ ...this.newProduct, price: Number(this.newProduct.price) });
                    this.products = db.getProducts();
                    this.showAddModal = false;
                    this.newProduct = { name: '', category: 'Phones', price: '', image: 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500&q=80', description: 'Premium mahsulot.', stock: 10 };
                    alert("Mahsulot qo'shildi!");
                },
                exportUsers() {
                    db.exportUsersToCSV();
                }
            }
        }
    </script>
</body>
</html>

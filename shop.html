<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahsulotlar - Premium Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="assets/js/db.js"></script>
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body x-data="shopPage()">
    <!-- Navbar (Same as index) -->
    <nav class="glass fixed w-full z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <a href="index.html" class="text-3xl font-extrabold tracking-tighter text-dark bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600">
                    PREMIUM<span class="text-dark font-light ml-1">STORE</span>
                </a>
                <div class="hidden md:flex items-center space-x-8">
                    <a href="index.html" class="text-dark hover:text-blue-600 font-medium transition">Bosh sahifa</a>
                    <a href="shop.html" class="text-blue-600 font-bold transition">Mahsulotlar</a>
                    <a href="about.html" class="text-dark hover:text-blue-600 font-medium transition">Biz haqimizda</a>
                    <a href="contact.html" class="text-dark hover:text-blue-600 font-medium transition">Aloqa</a>
                </div>
                <div class="flex items-center space-x-5" x-data="{ isDark: document.documentElement.classList.contains('dark') }">
                    <!-- Theme Toggle -->
                    <button @click="isDark = toggleTheme()" 
                            class="p-2.5 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-500 dark:text-gray-400 hover:text-indigo-600 transition duration-300">
                        <i x-show="!isDark" class="fas fa-moon text-xl"></i>
                        <i x-show="isDark" class="fas fa-sun text-xl" x-cloak></i>
                    </button>

                    <a href="cart.html" class="text-dark hover:text-blue-600 transition relative">
                        <i class="fas fa-shopping-cart text-xl"></i>
                        <span class="cart-badge absolute -top-2 -right-2 bg-blue-600 text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full">0</span>
                    </a>
                    <button @click="mobileMenu = !mobileMenu" class="md:hidden text-dark text-2xl"><i class="fas fa-bars"></i></button>
                </div>
            </div>
        </div>
    </nav>

    <main class="pt-32 pb-24 mesh-gradient-vibrant min-h-screen">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="glass p-8 rounded-[3rem] mb-12 flex flex-col md:flex-row justify-between items-start md:items-center gap-6 shadow-2xl">
                <div>
                    <h1 class="text-5xl font-black text-dark mb-2 tracking-tighter">Premium Galereya</h1>
                    <p class="text-gray-500 font-medium">Eng so'nggi va eng sifatli mahsulotlar to'plami.</p>
                </div>
                
                <div class="w-full md:w-auto flex flex-col sm:flex-row gap-4">
                    <div class="relative">
                        <input x-model="searchQuery" type="text" placeholder="Mahsulot qidirish..." class="w-full sm:w-72 bg-white/50 dark:bg-gray-900/50 backdrop-blur-xl border border-white/20 rounded-2xl px-6 py-4 outline-none focus:ring-2 focus:ring-blue-500 shadow-xl transition">
                        <i class="fas fa-search absolute right-6 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    </div>
                    <select x-model="activeCategory" class="bg-white/50 dark:bg-gray-900/50 backdrop-blur-xl border border-white/20 rounded-2xl px-6 py-4 outline-none focus:ring-2 focus:ring-blue-500 shadow-xl transition cursor-pointer text-dark">
                        <option value="Hammasi">Barcha kategoriyalar</option>
                        <option value="Phones">Telefonlar</option>
                        <option value="Laptops">Noutbuklar</option>
                        <option value="Audio">Audio</option>
                        <option value="Smart Watches">Smart soatlar</option>
                        <option value="Gaming">Geyming</option>
                        <option value="Accessories">Aksessuarlar</option>
                        <option value="Cameras">Kameralar</option>
                        <option value="Home Tech">Uy texnikasi</option>
                    </select>
                </div>
            </div>

            <!-- Products Grid -->
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-10">
                <template x-for="product in products" :key="product.id">
                    <div x-show="(activeCategory === 'Hammasi' || product.category === activeCategory) && matchesSearch(product)" 
                         class="glass rounded-[2.5rem] p-5 shadow-2xl card-hover group border border-white/20">
                        <div class="relative aspect-square rounded-[2rem] overflow-hidden mb-6 shadow-inner bg-gray-100/10">
                            <img :src="product.image" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                            <button class="absolute top-4 right-4 w-12 h-12 bg-white/80 backdrop-blur-md rounded-full flex items-center justify-center text-gray-400 hover:text-red-500 transition shadow-xl"><i class="far fa-heart text-xl"></i></button>
                            <div class="absolute bottom-4 left-4">
                                <span x-text="product.category" class="px-4 py-1.5 bg-indigo-600/90 backdrop-blur-md text-white text-[10px] font-black uppercase tracking-widest rounded-full shadow-lg dark:neon-glow"></span>
                            </div>
                        </div>
                        <div class="px-2">
                            <h3 class="text-xl font-black text-dark dark:text-neon mb-2 hover:text-indigo-600 transition leading-tight">
                                <a :href="'product-detail.html?id=' + product.id" x-text="product.name"></a>
                            </h3>
                            <div class="flex items-center justify-between mt-6">
                                <div class="flex flex-col">
                                    <span x-show="product.oldPrice" x-text="formatPrice(product.oldPrice)" class="text-xs text-red-500 line-through mb-1 opacity-60"></span>
                                    <span x-text="formatPrice(product.price)" class="text-2xl font-black text-dark dark:text-white"></span>
                                </div>
                                <button @click="addToCart(product.id)" class="w-14 h-14 bg-indigo-600 text-white rounded-2xl flex items-center justify-center hover:bg-dark hover:scale-105 transition active:scale-95 shadow-xl shadow-indigo-600/30 dark:neon-glow">
                                    <i class="fas fa-shopping-basket text-xl"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
            
            <!-- Empty State -->
            <div x-show="products.filter(p => (activeCategory === 'Hammasi' || p.category === activeCategory) && matchesSearch(p)).length === 0" 
                 class="py-32 text-center glass rounded-[3rem] mt-12 border border-white/20 overflow-hidden relative">
                <div class="absolute inset-0 opacity-10 mesh-gradient-vibrant"></div>
                <div class="relative z-10 text-gray-400">
                    <div class="w-32 h-32 bg-gray-100/20 rounded-full flex items-center justify-center mx-auto mb-8 text-indigo-500 shadow-2xl">
                        <i class="fas fa-search-minus text-5xl"></i>
                    </div>
                    <h3 class="text-3xl font-black text-dark mb-3 tracking-tighter">Hech narsa topilmadi</h3>
                    <p class="text-lg font-medium">Boshqa kalit so'zlar bilan qidirib ko'ring yoki kategoriyani o'zgartiring.</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer (Same as index) -->
    <footer class="bg-dark text-white pt-24 pb-12">
        <!-- ... (Same footer as index.html) ... -->
    </footer>

    <script src="assets/js/main.js"></script>
    <script>
        function shopPage() {
            const urlParams = new URLSearchParams(window.location.search);
            const initialCat = urlParams.get('cat') || 'Hammasi';
            const initialSearch = urlParams.get('q') || '';

            return {
                mobileMenu: false,
                activeCategory: initialCat,
                searchQuery: initialSearch,
                products: db.getProducts(),
                formatPrice(price) {
                    return price.toLocaleString() + " so'm";
                },
                matchesSearch(product) {
                    const q = this.searchQuery.toLowerCase();
                    const nameMatch = product.name.toLowerCase().includes(q);
                    const catMatch = product.category.toLowerCase().includes(q);
                    // Also check localized names if needed, but name includes 'Telefon' usually
                    const categoryMap = {
                        'Phones': 'telefon',
                        'Laptops': 'noutbuk',
                        'Audio': 'audio',
                        'Gaming': 'geyming'
                    };
                    const localizedCatMatch = categoryMap[product.category] ? categoryMap[product.category].includes(q) : false;
                    
                    return nameMatch || catMatch || localizedCatMatch;
                },
                addToCart(id) {
                    if (window.addToCart) {
                        window.addToCart(id);
                    } else {
                        const product = this.products.find(p => p.id === id);
                        alert(product.name + " savatchaga qo'shildi!");
                    }
                }
            }
        }
    </script>
</body>
</html>
